name: Build & publish extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.15.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build wasm
        run: wasm-pack build --target web -- --locked

      - name: Assemble extension folder
        run: |
          mkdir -p dist
          cp manifest.json index.js dist/
          cp -r assets dist/assets
          cp -r scripts dist/scripts
          cp -r pkg dist/pkg
          # pkg ships JS + wasm; drop npm packaging noise.
          rm -f dist/pkg/.gitignore dist/pkg/package.json

      - name: Publish to release branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: release
          folder: dist
          single-commit: true
